<!DOCTYPE html>
<html lang="en" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#06080f">
<title>Infrastructure — Multi-Agent Infrastructure Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg-deep:#06080f;--bg-surface:#0F172A;--bg-elevated:#1E293B;--border:#334155;--text:#F8FAFC;--secondary:#94A3B8;--muted:#64748B;--accent:#22C55E;--accent-dim:rgba(34,197,94,0.12);--accent-b:#06B6D4;--danger:#EF4444;--font:'JetBrains Mono',monospace;--radius-sm:4px;--radius-md:8px;--radius-lg:16px;--ease:0.2s cubic-bezier(0.16,1,0.3,1)}
body{font-family:var(--font);background:var(--bg-deep);color:var(--text);padding:24px;font-size:14px;line-height:1.7}
::selection{background:var(--accent);color:var(--bg-deep)}
:focus-visible{outline:2px solid var(--accent)}
.container{max-width:960px;margin:0 auto}
h1{font-size:1.3rem;font-weight:500;text-transform:uppercase;margin-bottom:4px}
h1 em{font-style:normal;color:var(--accent)}
.subtitle{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:24px}
.card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:20px}
.card-label{font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:8px}
select,textarea{width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-family:var(--font);font-size:0.75rem;color:var(--text)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 18px;background:var(--accent);color:var(--bg-deep);font-family:var(--font);font-size:0.7rem;font-weight:500;border:none;border-radius:var(--radius-sm);cursor:pointer;width:100%;margin-top:14px}
.btn:hover{box-shadow:0 0 20px rgba(34,197,94,0.35)}
.btn:disabled{opacity:0.3}
.result-pre{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-size:0.68rem;line-height:1.6;white-space:pre-wrap;max-height:360px;overflow-y:auto;color:var(--secondary);margin-top:12px}
a{color:var(--accent);text-decoration:none}
footer{margin-top:36px;padding-top:12px;border-top:1px solid var(--border);font-size:0.55rem;color:var(--muted)}
</style>
</head>
<body>
<div class="container">
<h1>infrastructure <em>manager</em></h1>
<p class="subtitle">Multi-Agent Infrastructure Management — 5 Specialized Agents</p>
<div class="card">
<p class="card-label">// agent_selector</p>
<select id="agentSelect">
<option value="infrastructure">Infrastructure Analyzer</option>
<option value="security">Security Auditor</option>
<option value="performance">Performance Optimizer</option>
<option value="cost">Cost Manager</option>
<option value="incident">Incident Responder</option>
</select>
<button class="btn" id="runBtn">Run Agent</button>
<pre class="result-pre" id="output">Select an agent and click Run.</pre>
</div>
<a href="/">&larr; Back to Debugger</a>
<footer><p>// infrastructure ctl // 5 agents // openai agents sdk</p></footer>
</div>
<script>
document.getElementById('runBtn').addEventListener('click',async function(){
const btn=this,out=document.getElementById('output'),agent=document.getElementById('agentSelect').value;
btn.disabled=true;out.textContent='Running '+agent+'...';
try{const r=await fetch('/api/infrastructure/'+agent,{method:'POST'});const d=await r.json();
if(d.success)out.textContent=JSON.stringify(d.result?.output||d.result||d,null,2);else out.textContent='Error: '+(d.error||'Unknown')}
catch(e){out.textContent='Error: '+e.message}finally{btn.disabled=false}});
</script>
</body>
</html>
