<!DOCTYPE html>
<html lang="en" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#06080f">
<title>Code Debugger — Multi-Agent AI Debugging System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg-deep:#06080f;--bg-surface:#0F172A;--bg-elevated:#1E293B;--bg-hover:#273549;--border:#334155;--border-glow:rgba(34,197,94,0.35);--text:#F8FAFC;--secondary:#94A3B8;--muted:#64748B;--accent:#22C55E;--accent-dim:rgba(34,197,94,0.12);--accent-b:#06B6D4;--accent-b-dim:rgba(6,182,212,0.12);--accent-c:#F59E0B;--accent-c-dim:rgba(245,158,11,0.12);--danger:#EF4444;--danger-dim:rgba(239,68,68,0.12);--font:'JetBrains Mono',monospace;--radius-sm:4px;--radius-md:8px;--radius-lg:16px;--ease:0.2s cubic-bezier(0.16,1,0.3,1)}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg-deep);color:var(--text);min-height:100vh;line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-size:14px;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
::selection{background:var(--accent);color:var(--bg-deep)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--radius-sm)}
p{color:var(--secondary)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.bg-glow{position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;opacity:0.06}
.bg-glow-1{top:-200px;left:-100px;background:var(--accent)}
.bg-glow-2{bottom:-200px;right:-100px;background:var(--accent-b)}
.container{max-width:960px;margin:0 auto;padding:40px 20px 64px;position:relative;z-index:1}
h1{font-size:clamp(1.4rem,3vw,1.9rem);font-weight:500;letter-spacing:-0.01em;text-transform:uppercase;margin-bottom:4px;line-height:1.3}
h1 em{font-style:normal;color:var(--accent)}
header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:36px;padding-bottom:14px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.header-tagline{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em}
.card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:20px}
.card-body{padding:24px 28px}
.card-label{font-size:0.55rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);padding:12px 28px 0;font-weight:500}
.form-group{margin-bottom:18px}
label{display:block;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:5px;font-weight:500}
textarea,input{width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-family:var(--font);font-size:0.78rem;color:var(--text);transition:border-color var(--ease),box-shadow var(--ease)}
textarea:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim)}
textarea::placeholder{color:var(--muted)}
textarea{min-height:140px;resize:vertical;line-height:1.7;font-size:0.72rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 24px;margin-top:16px;background:var(--accent);color:var(--bg-deep);font-family:var(--font);font-size:0.75rem;font-weight:500;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:box-shadow var(--ease),transform var(--ease)}
.btn:hover{box-shadow:0 0 20px var(--border-glow);transform:translateY(-1px)}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.btn svg{width:14px;height:14px}
.result-card{display:none}
.result-card.active{display:block}
.result-head{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border)}
.result-head span{font-size:0.65rem;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 11px;border-radius:12px;font-size:0.6rem;font-weight:500;text-transform:uppercase}
.badge.pass{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(34,197,94,0.25)}
.badge.fail{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(239,68,68,0.25)}
.result-body{padding:18px 28px 24px}
.result-pre{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;font-size:0.7rem;line-height:1.7;white-space:pre-wrap;max-height:400px;overflow-y:auto;color:var(--secondary)}
.err{display:none;margin-top:14px;background:var(--danger-dim);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius-sm);padding:12px 16px;color:var(--danger);font-size:0.7rem;align-items:flex-start;gap:8px}
.err.active{display:flex}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(6,8,15,0.93);backdrop-filter:blur(12px);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:22px}
.loading-overlay.active{display:flex}
.loading-cursor{width:12px;height:18px;background:var(--accent);animation:blink 0.8s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.loading-text{font-size:0.78rem;color:var(--secondary);text-align:center;line-height:2}
.loading-text span{color:var(--accent)}
.loading-steps{display:flex;gap:22px;margin-top:4px;justify-content:center}
.loading-step{font-size:0.6rem;color:var(--muted);opacity:0.3;transition:opacity 0.3s}
.loading-step.active{color:var(--accent);opacity:1}
footer{margin-top:48px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
footer p{font-size:0.55rem;color:var(--muted)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.af{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) backwards}
.ad1{animation-delay:0.05s}.ad2{animation-delay:0.1s}.ad3{animation-delay:0.15s}
@media(prefers-reduced-motion:reduce){*, .af{animation:none!important}html{scroll-behavior:auto}}
@media(max-width:768px){
.container{padding:24px 14px 48px}
.form-row{grid-template-columns:1fr}
.card-body{padding:18px}
}
</style>
</head>
<body>
<div class="bg-grid" aria-hidden="true"></div>
<div class="bg-glow bg-glow-1" aria-hidden="true"></div>
<div class="bg-glow bg-glow-2" aria-hidden="true"></div>
<div class="container">
<header>
<div><h1>code&nbsp;<em>debugger</em></h1><p class="header-tagline">Multi-Agent AI Debugging System</p></div>
</header>
<div class="card af ad1">
<p class="card-label">$ ./submit_error_trace</p>
<div class="card-body">
<form id="debugForm" novalidate>
<div class="form-group">
<label for="errorTrace">Error Trace / Stack Trace <span style="color:var(--accent-b)">*</span></label>
<textarea id="errorTrace" autocomplete="off" spellcheck="false" placeholder="$ paste error trace here..."></textarea>
</div>
<div class="form-row">
<div class="form-group"><label for="failingFile">Failing File</label><input type="text" id="failingFile" placeholder="path/to/file.py"></div>
<div class="form-group"><label for="failingLine">Failing Line</label><input type="number" id="failingLine" placeholder="42"></div>
</div>
</form>
<div class="err" id="errorMsg" role="alert"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="errorText"></span></div>
<button type="button" class="btn" id="submitBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Run Analysis</button>
</div>
</div>
<div class="card result-card" id="resultCard">
<div class="result-head"><span>// analysis_report.md</span><span class="badge" id="statusBadge"></span></div>
<div class="result-body"><pre class="result-pre" id="reportContent" tabindex="0"></pre></div>
</div>
<a href="/infrastructure" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 14px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.65rem;color:var(--secondary)">Infrastructure Management &rarr;</a>
<footer><p>// code debugger v2 // 20 agents // autonomous repair</p><p>powered by openai agents sdk</p></footer>
</div>
<div class="loading-overlay" id="loadingOverlay">
<div class="loading-cursor" aria-hidden="true"></div>
<div class="loading-text"><span>$</span> Running Analysis...<div class="loading-steps"><span class="loading-step" id="step1">Root Cause</span><span class="loading-step" id="step2">Fix Generation</span><span class="loading-step" id="step3">Validation</span></div></div>
</div>
<script>
const ss=['step1','step2','step3'];let ci=0,iv;
function sl(){ci=0;ss.forEach((id,i)=>document.getElementById(id).classList.toggle('active',i===0));iv=setInterval(()=>{document.getElementById(ss[ci]).classList.remove('active');ci=(ci+1)%3;document.getElementById(ss[ci]).classList.add('active')},2200)}
function stl(){clearInterval(iv);ss.forEach(id=>document.getElementById(id).classList.remove('active'))}
document.getElementById('submitBtn').addEventListener('click',async()=>{
const e=document.getElementById('errorTrace'),ff=document.getElementById('failingFile'),fl=document.getElementById('failingLine');
const em=document.getElementById('errorMsg'),rc=document.getElementById('resultCard'),btn=document.getElementById('submitBtn');
if(!e.value.trim()){em.classList.add('active');return}
em.classList.remove('active');rc.classList.remove('active');btn.disabled=true;document.getElementById('loadingOverlay').classList.add('active');sl();
try{const r=await fetch('/debug',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({error_trace:e.value,failing_file:ff.value||'unknown',failing_line:fl.value?parseInt(fl.value):null})});const d=await r.json();
if(d.success){const sb=document.getElementById('statusBadge'),rp=document.getElementById('reportContent');sb.className='badge '+(d.validation_passed?'pass':'fail');sb.innerHTML=(d.validation_passed?'PASS':'FAIL');rp.textContent=d.final_report;rc.classList.add('active')}
else{document.getElementById('errorText').textContent=d.error||'Failed';em.classList.add('active')}}
catch(e2){document.getElementById('errorText').textContent='Connection error';em.classList.add('active')}
finally{document.getElementById('loadingOverlay').classList.remove('active');stl();btn.disabled=false}});
document.getElementById('errorTrace').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))document.getElementById('submitBtn').click()});
</script>
</body>
</html>
