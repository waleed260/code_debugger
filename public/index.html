<!DOCTYPE html>
<html lang="en" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#09090b">
<title>Code Debugger — AI Debug Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--surface:#111113;--elevated:#1a1a1e;--border:#27272a;--text:#fafafa;--secondary:#a1a1aa;--muted:#52525b;--accent:#10b981;--accent-dim:rgba(16,185,129,0.08);--accent-glow:rgba(16,185,129,0.15);--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--radius:12px;--sm:8px;--ease:0.2s ease}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:24px;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#09090b}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.container{max-width:680px;margin:0 auto}
header{margin-bottom:32px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;color:#09090b;font-weight:700;font-family:var(--mono)}
.logo-text{font-size:1.1rem;font-weight:600;letter-spacing:-0.01em}
.tagline{font-size:0.72rem;color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.card-body{padding:20px 22px}
.card-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);padding:10px 22px 0;font-weight:500}
.form-group{margin-bottom:14px}
label{display:block;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:5px;font-weight:500}
textarea,input{width:100%;background:var(--elevated);border:1px solid var(--border);border-radius:var(--sm);padding:10px 13px;font-family:var(--mono);font-size:0.75rem;color:var(--text)}
textarea:focus,input:focus{outline:none;border-color:var(--accent)}
textarea{min-height:110px;resize:vertical;line-height:1.6;font-size:0.7rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 20px;margin-top:12px;border:none;border-radius:var(--sm);font-family:var(--font);font-size:0.78rem;font-weight:600;cursor:pointer;background:var(--accent);color:#09090b}
.btn:hover{box-shadow:0 0 24px var(--accent-glow)}
.btn:disabled{opacity:0.3}
.result-card{display:none}
.result-card.active{display:block}
.result-head{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--border)}
.result-head span{font-size:0.65rem;color:var(--muted);font-family:var(--mono)}
.pill{display:inline-flex;padding:2px 10px;border-radius:10px;font-size:0.6rem;font-weight:600;text-transform:uppercase}
.pill.pass{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(16,185,129,0.25)}
.pill.fail{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
.result-body{padding:16px 22px 20px}
.result-pre{background:var(--elevated);border:1px solid var(--border);border-radius:var(--sm);padding:14px;font-family:var(--mono);font-size:0.68rem;line-height:1.5;white-space:pre-wrap;max-height:360px;overflow-y:auto;color:var(--secondary)}
.bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--elevated);border:1px solid var(--border);border-radius:var(--sm)}
.bar .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.bar .n{font-size:0.72rem;font-weight:500;color:var(--secondary)}
.bar .d{font-size:0.62rem;color:var(--muted);margin-left:auto}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.tags span{font-size:0.55rem;padding:2px 8px;background:var(--elevated);border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:var(--mono)}
a{display:inline-flex;align-items:center;gap:5px;margin-top:12px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--sm);font-size:0.6rem;color:var(--secondary);text-decoration:none;background:var(--surface)}
a:hover{border-color:var(--accent);color:var(--accent)}
.err{display:none;margin-top:10px;padding:9px 13px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);border-radius:var(--sm);color:#ef4444;font-size:0.68rem}
.err.active{display:flex}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(9,9,11,0.94);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.loading-overlay.active{display:flex}
.loading-ring{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:s 0.7s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.loading-text{font-size:0.78rem;color:var(--secondary)}
.loading-text span{color:var(--accent)}
footer{margin-top:36px;padding-top:12px;border-top:1px solid var(--border);font-size:0.55rem;color:var(--muted);text-align:center}
@media(max-width:600px){.container{padding:12px}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<header><div class="logo"><div class="logo-icon">{/}</div><div class="logo-text">Code Debugger</div></div><p class="tagline">AI Debug Agent</p></header>
<div class="card"><div class="card-label">$ debug</div><div class="card-body">
<form id="f" novalidate>
<div class="form-group"><label for="e">Error trace</label><textarea id="e" autocomplete="off" spellcheck="false" placeholder="Paste stack trace..."></textarea></div>
<div class="form-row"><div class="form-group"><label for="f">File</label><input type="text" id="f" placeholder="app.py"></div><div class="form-group"><label for="l">Line</label><input type="number" id="l" placeholder="42"></div></div>
</form>
<div class="err" id="em"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="et"></span></div>
<button class="btn" id="s"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Debug</button>
</div></div>
<div class="card result-card" id="rc"><div class="result-head"><span>// report</span><span class="pill" id="sp"></span></div><div class="result-body"><pre class="result-pre" id="rp"></pre></div></div>
<div><div class="bar"><div class="dot"></div><span class="n">Debug Agent</span><span class="d">RCA &middot; Fix &middot; Validate</span></div><div class="tags"><span>trace</span><span>deps</span><span>runtime</span><span>dataflow</span><span>fix</span><span>validate</span><span>regression</span><span>security</span><span>perf</span><span>refactor</span></div></div>
<div style="display:flex;gap:6px;margin-top:14px"><a href="/infrastructure">Infrastructure</a><a href="/v2/">Advanced</a></div>
<footer>code debugger</footer>
</div>
<div class="loading-overlay" id="lo"><div class="loading-ring"></div><div class="loading-text"><span>$</span> Debugging...</div></div>
<script>
document.getElementById('s').addEventListener('click',async()=>{
const e=document.getElementById('e'),f=document.getElementById('f'),l=document.getElementById('l'),em=document.getElementById('em'),rc=document.getElementById('rc'),btn=document.getElementById('s');
if(!e.value.trim()){em.classList.add('active');return}
em.classList.remove('active');rc.classList.remove('active');btn.disabled=true;document.getElementById('lo').classList.add('active');
try{const r=await fetch('/debug',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({error_trace:e.value,failing_file:f.value||'unknown',failing_line:l.value?parseInt(l.value):null})});const d=await r.json();
if(d.success){const p=document.getElementById('sp'),rp=document.getElementById('rp');p.className='pill '+(d.validation_passed?'pass':'fail');p.textContent=d.validation_passed?'PASS':'FAIL';rp.textContent=d.final_report;rc.classList.add('active');rc.scrollIntoView({behavior:'smooth'})}
else{document.getElementById('et').textContent=d.error||'Failed';em.classList.add('active')}}
catch(e2){document.getElementById('et').textContent='Connection error';em.classList.add('active')}
finally{document.getElementById('lo').classList.remove('active');btn.disabled=false}});
document.getElementById('e').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))document.getElementById('s').click()});
</script>
</body>
</html>
